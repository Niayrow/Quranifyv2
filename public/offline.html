<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Quranify - Hors ligne</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 0%, rgba(16, 185, 129, .16), transparent 42%),
          linear-gradient(160deg, #020617, #03120f 62%, #020617);
      }
      main {
        max-width: 380px;
        text-align: center;
      }
      img {
        width: 82px;
        height: 82px;
        border-radius: 22px;
        box-shadow: 0 18px 42px rgba(16, 185, 129, .18);
      }
      h1 {
        margin: 24px 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        margin-top: 24px;
        padding: 12px 16px;
        border-radius: 14px;
        background: #10b981;
        color: #020617;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/android-chrome-192x192.png" alt="Quranify" />
      <h1>Mode hors ligne</h1>
      <p>Quranify est installé, mais le catalogue et le streaming audio ont besoin d'une connexion pour se synchroniser.</p>
      <a href="/">Réessayer</a>
    </main>
  </body>
</html>
